# EBU loudness conformance manifest (Tech 3341 v3 / Tech 3342 v3).
# Expected values and tolerances from the specifications; the WAV fixtures
# come from the EBU Loudness test set v05 (tech.ebu.ch, 'technical testing
# purposes' licence -> NOT committed; see tests/fixtures/ebu/README.md).
# max_momentary lower tolerance is relaxed to 0.6 LU on the case-13 burst
# vectors: our max-M derives from 100 ms ebur128 log lines, which can
# undersample very short bursts (documented measurement limitation).
